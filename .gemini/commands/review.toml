description = "Scans the entire Android codebase for security vulnerabilities, broken logic, anti-uninstall gaps, and manifest issues. Produces a full prioritized report with exact fixes."

prompt = """
You are a senior Android security engineer and code reviewer. Scan every file in the current project directory and produce a detailed analysis report.

STEP 1 - Read these files first:
- app/src/main/AndroidManifest.xml
- All .java and .kt files inside app/src/main/java/
- All .xml files inside app/src/main/res/xml/
- app/build.gradle or app/build.gradle.kts
- Any file with Admin, Receiver, Service, Blocker, Block, or Overlay in the name

STEP 2 - Check for the following:

SECURITY VULNERABILITIES
- Is any sensitive operation like PIN, password, or admin deactivation done without authentication?
- Are there hardcoded secrets, API keys, or passwords anywhere in the code?
- Are any broadcast receivers or services exported without a permission guard?
- Is allowBackup set to true in the manifest? This lets users extract app data and bypass protections.
- Can a user send an intent to bypass the blocker?

ANTI-UNINSTALL GAPS
- Is DeviceAdminReceiver declared in the manifest?
- Is onDisableRequested() overridden in the AdminReceiver class? If not, users can silently deactivate admin and uninstall freely.
- Does onDisableRequested() actually block or warn the user?
- Is Device Owner mode set up via ADB using dpm set-device-owner? If not, flag this as the most critical gap.
- Is there an AccessibilityService watching the Device Admin settings screen specifically?
- Does the AccessibilityService only check English text? If so, flag the language bypass vulnerability.

BROKEN OR MISSING LOGIC
- Is the foreground service restarting itself if killed by the system?
- Is BOOT_COMPLETED receiver working so the blocker re-enables after phone restart?
- Can the user escape the block overlay using the Home button, Recents button, or notifications?
- Are all services and receivers declared in the manifest actually implemented in code?
- Are there any TODO, FIXME, or unimplemented methods in the code?
- Is there logic to handle the case where Accessibility Service gets disabled by the user?
- Is there a battery-draining while(true) polling loop anywhere?

MANIFEST ISSUES
- Are all declared activities, services, and receivers actually implemented in code?
- Is foreground service type correctly declared for Android 14 and above?
- Is PACKAGE_USAGE_STATS being requested correctly via the special Settings screen?
- Is REQUEST_IGNORE_BATTERY_OPTIMIZATIONS handled so the service survives Doze mode?

BUILD AND CONFIG ISSUES
- What is the minSdkVersion and targetSdkVersion? Flag if below API 26.
- Are any deprecated APIs used that may break on newer Android versions?
- Is ProGuard or R8 enabled for release builds? If not, the app logic is easily reversible.

STEP 3 - Write the full report in this format:

# Android App Analysis Report
Date: [today's date]

## Summary Table
| Category | Issues Found | Severity |
|---|---|---|
| Security Vulnerabilities | X | Critical / Medium / Low |
| Anti-Uninstall Gaps | X | Critical / Medium / Low |
| Broken Logic | X | Critical / Medium / Low |
| Manifest Issues | X | Critical / Medium / Low |
| Build Issues | X | Critical / Medium / Low |

## Security Vulnerabilities
For each issue: exact file name and line number, what the problem is, why it matters, and how to fix it with a code snippet.

## Anti-Uninstall Protection Gaps
For each gap: what is missing, where to add it, and the exact code to add.

## Broken or Missing Logic
For each issue: exact file name and line number, what is broken, and the fix.

## Manifest Issues
For each issue: what it is and how to fix it.

## Build and Config Issues
For each issue: what it is and how to fix it.

## What Is Working Correctly
List things that are implemented correctly.

## Priority Fix List - Do These First
1. Most critical fix
2. Second most critical
3. Continue in order

## ADB Commands to Run
Provide exact copy-paste ADB commands, especially for setting Device Owner.
Step 1: [command]
Step 2: [command]
Step 3: [command]

Rules:
- Always mention the exact file name and line number for every issue.
- For every problem found, provide a concrete fix or code snippet. Never be vague.
- If a file is declared in the manifest but does not exist in the codebase, flag it as a CRITICAL MISSING FILE.
- Severity: Critical means breaks the app or can be exploited. Medium means weakens protection. Low means best practice improvement.
- Always end with the exact ADB command to set Device Owner if it is not already configured.
"""
